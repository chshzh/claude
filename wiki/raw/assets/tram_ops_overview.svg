<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Noto Sans CJK SC, Noto Emoji, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold" letter-spacing="2">🏙️ 现代有轨电车运行管理系统架构</text>
  <text x="550" y="68" text-anchor="middle" fill="#64748b" font-size="12">Modern Tram Operations Management System Architecture</text>

  <!-- OCC Central Box -->
  <rect x="330" y="90" width="440" height="130" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="118" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold">🎛️ 运行控制中心 (OCC)</text>
  <text x="550" y="138" text-anchor="middle" fill="#94a3b8" font-size="11">Operations Control Centre</text>

  <!-- OCC sub-boxes -->
  <rect x="348" y="150" width="95" height="55" rx="6" fill="url(#blueGrad)" opacity="0.85"/>
  <text x="395" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">ATS</text>
  <text x="395" y="192" text-anchor="middle" fill="#bfdbfe" font-size="8">列车自动监督</text>
  <rect x="453" y="150" width="95" height="55" rx="6" fill="url(#purpleGrad)" opacity="0.85"/>
  <text x="500" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">SCADA</text>
  <text x="500" y="192" text-anchor="middle" fill="#ddd6fe" font-size="8">电力/设备监控</text>
  <rect x="558" y="150" width="95" height="55" rx="6" fill="url(#greenGrad)" opacity="0.85"/>
  <text x="605" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">AVLS</text>
  <text x="605" y="192" text-anchor="middle" fill="#d1fae5" font-size="8">车辆定位系统</text>
  <rect x="663" y="150" width="95" height="55" rx="6" fill="url(#orangeGrad)" opacity="0.85"/>
  <text x="710" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">PIS + CCTV</text>
  <text x="710" y="192" text-anchor="middle" fill="#fef3c7" font-size="8">乘客信息+安防</text>

  <!-- Communication lines from OCC -->
  <line x1="550" y1="220" x2="550" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Horizontal backbone -->
  <line x1="80" y1="260" x2="1020" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="450" y="250" width="200" height="20" rx="4" fill="#1e3a5f"/>
  <text x="550" y="264" text-anchor="middle" fill="#93c5fd" font-size="10">冗余光纤 + LTE/5G-R + TETRA 通信骨干网</text>

  <!-- 5 subsystem boxes below OCC -->
  <!-- 1. Signaling -->
  <rect x="55" y="290" width="175" height="185" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="55" y="290" width="175" height="32" rx="10" fill="#8b5cf6" opacity="0.3"/>
  <text x="142" y="311" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">🚦 信号与列车控制</text>
  <text x="142" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10">• 目视行车 (LoS)</text>
  <text x="142" y="358" text-anchor="middle" fill="#cbd5e1" font-size="10">• CBTC (IEEE 1474)</text>
  <text x="142" y="376" text-anchor="middle" fill="#cbd5e1" font-size="10">• ATP 自动防护</text>
  <text x="142" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10">• ATO 自动驾驶</text>
  <text x="142" y="412" text-anchor="middle" fill="#cbd5e1" font-size="10">• 道岔联锁 (CBI)</text>
  <text x="142" y="438" text-anchor="middle" fill="#64748b" font-size="9">GoA 0–4<br/>手动→无人驾驶</text>

  <!-- Vertical connector -->
  <line x1="142" y1="475" x2="142" y2="285" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="142" y1="285" x2="142" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 2. Intersection Priority -->
  <rect x="255" y="290" width="175" height="185" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="255" y="290" width="175" height="32" rx="10" fill="#f59e0b" opacity="0.3"/>
  <text x="342" y="311" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">🚥 路口信号优先 (TSP)</text>
  <text x="342" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10">• 绿灯延长</text>
  <text x="342" y="358" text-anchor="middle" fill="#cbd5e1" font-size="10">• 红灯早断</text>
  <text x="342" y="376" text-anchor="middle" fill="#cbd5e1" font-size="10">• 相位旋转/插入</text>
  <text x="342" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10">• 绿波协调</text>
  <text x="342" y="418" text-anchor="middle" fill="#64748b" font-size="9">检测方式：</text>
  <text x="342" y="436" text-anchor="middle" fill="#64748b" font-size="9">感应线圈/RFID/GPS/V2X</text>

  <line x1="342" y1="475" x2="342" y2="285" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="342" y1="285" x2="342" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 3. Traction Power -->
  <rect x="455" y="290" width="175" height="185" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="455" y="290" width="175" height="32" rx="10" fill="#ef4444" opacity="0.3"/>
  <text x="542" y="311" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">⚡ 牵引供电管理</text>
  <text x="542" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10">• 750V DC 接触网</text>
  <text x="542" y="358" text-anchor="middle" fill="#cbd5e1" font-size="10">• APS 地面供电</text>
  <text x="542" y="376" text-anchor="middle" fill="#cbd5e1" font-size="10">• 超级电容/电池</text>
  <text x="542" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10">• TPSS 1-3km/座</text>
  <text x="542" y="418" text-anchor="middle" fill="#64748b" font-size="9">能量回收：</text>
  <text x="542" y="436" text-anchor="middle" fill="#64748b" font-size="9">再生制动→储能/逆变/车车互馈</text>

  <line x1="542" y1="475" x2="542" y2="285" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <line x1="542" y1="285" x2="542" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 4. Depot -->
  <rect x="655" y="290" width="175" height="185" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="655" y="290" width="175" height="32" rx="10" fill="#10b981" opacity="0.3"/>
  <text x="742" y="311" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">🏭 车辆段管理</text>
  <text x="742" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10">• 停车/调度</text>
  <text x="742" y="358" text-anchor="middle" fill="#cbd5e1" font-size="10">• 日检/周检</text>
  <text x="742" y="376" text-anchor="middle" fill="#cbd5e1" font-size="10">• 定期检修</text>
  <text x="742" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10">• 大修/架修</text>
  <text x="742" y="418" text-anchor="middle" fill="#64748b" font-size="9">支持系统：</text>
  <text x="742" y="436" text-anchor="middle" fill="#64748b" font-size="9">洗车/加砂/ERP/SAP</text>

  <line x1="742" y1="475" x2="742" y2="285" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <line x1="742" y1="285" x2="742" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 5. Monitoring -->
  <rect x="855" y="290" width="175" height="185" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="855" y="290" width="175" height="32" rx="10" fill="#06b6d4" opacity="0.3"/>
  <text x="942" y="311" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="bold">📊 实时监测与预测维护</text>
  <text x="942" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10">• 车载 TCMS</text>
  <text x="942" y="358" text-anchor="middle" fill="#cbd5e1" font-size="10">• 事件记录"黑匣子"</text>
  <text x="942" y="376" text-anchor="middle" fill="#cbd5e1" font-size="10">• 轮对冲击检测</text>
  <text x="942" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10">• 受电弓监测</text>
  <text x="942" y="418" text-anchor="middle" fill="#64748b" font-size="9">AI/ML：</text>
  <text x="942" y="436" text-anchor="middle" fill="#64748b" font-size="9">故障预测+自动工单</text>

  <line x1="942" y1="475" x2="942" y2="285" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="942" y1="285" x2="942" y2="260" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Bottom: Onboard System & Wayside -->
  <rect x="250" y="500" width="600" height="65" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="523" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="bold">🚃 车载系统 (每列车)</text>
  <text x="550" y="550" text-anchor="middle" fill="#94a3b8" font-size="11">TCMS · GPS/北斗+里程计定位 · 无线数据卸载 (Wi-Fi/LTE) · 司机人机界面 (DMI) · 乘客信息屏 · 车载CCTV</text>

  <!-- Connection to OCC from bottom -->
  <line x1="550" y1="500" x2="550" y2="480" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Vendors row -->
  <rect x="250" y="585" width="600" height="50" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="550" y="610" text-anchor="middle" fill="#64748b" font-size="11">全球主要供应商 ·  Siemens | Alstom | CRRC | Thales | Hitachi Rail | CAF</text>
  <text x="550" y="626" text-anchor="middle" fill="#475569" font-size="9">Trainguard MT / Vicos · Iconis / Smartlock / APS · 中国通号TST · SelTrac · 日立ATS · Urbos</text>

  <!-- Trend tags -->
  <rect x="85" y="655" width="150" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="160" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">🔋 无触网供电</text>
  <rect x="250" y="655" width="140" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">☁️ 云化OCC</text>
  <rect x="405" y="655" width="140" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="475" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">🤖 自动驾驶</text>
  <rect x="560" y="655" width="130" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="625" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">🪞 数字孪生</text>
  <rect x="705" y="655" width="130" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="770" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">📡 C-V2X</text>
  <rect x="850" y="655" width="130" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="915" y="675" text-anchor="middle" fill="#94a3b8" font-size="10">⚡ 智能电网融合</text>
</svg>