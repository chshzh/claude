<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Noto Sans CJK SC, Noto Emoji, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold" letter-spacing="1">⚡ 现代有轨电车牵引供电系统</text>
  <text x="500" y="58" text-anchor="middle" fill="#64748b" font-size="12">Traction Power Supply Architecture — 750V DC System</text>

  <!-- === Power Grid → Substation === -->
  <!-- AC Grid -->
  <rect x="400" y="80" width="200" height="55" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="105" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">🏭 城市电网</text>
  <text x="500" y="125" text-anchor="middle" fill="#fcd34d" font-size="10">AC 10~35 kV 三相</text>

  <!-- Arrow down -->
  <line x1="500" y1="135" x2="500" y2="160" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowE)"/>

  <!-- TPSS Box -->
  <rect x="330" y="165" width="340" height="95" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="330" y="165" width="340" height="30" rx="10" fill="#ef4444" opacity="0.25"/>
  <text x="500" y="185" text-anchor="middle" fill="#f87171" font-size="14" font-weight="bold">⚙️ 牵引变电所 (TPSS) · 间距 1–3 km</text>

  <!-- Substation internals -->
  <rect x="348" y="200" width="90" height="50" rx="5" fill="#7f1d1d"/>
  <text x="393" y="220" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">变压器</text>
  <text x="393" y="240" text-anchor="middle" fill="#fca5a5" font-size="9">AC→低压AC</text>
  <rect x="450" y="200" width="90" height="50" rx="5" fill="#7f1d1d"/>
  <text x="495" y="220" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">整流器</text>
  <text x="495" y="240" text-anchor="middle" fill="#fca5a5" font-size="9">AC→DC</text>
  <rect x="552" y="200" width="90" height="50" rx="5" fill="#7f1d1d"/>
  <text x="597" y="220" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">直流开关柜</text>
  <text x="597" y="240" text-anchor="middle" fill="#fca5a5" font-size="9">保护+馈出</text>
  <!-- Arrows inside -->
  <text x="426" y="230" fill="#f87171" font-size="14">→</text>
  <text x="546" y="230" fill="#f87171" font-size="14">→</text>

  <!-- Arrow down from TPSS -->
  <line x1="500" y1="260" x2="500" y2="285" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowB)"/>

  <!-- DC feeder label -->
  <text x="530" y="278" fill="#f87171" font-size="10">750V DC</text>

  <!-- === Contact Line / Catenary === -->
  <!-- Overhead contact line -->
  <line x1="50" y1="310" x2="950" y2="310" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="50" y1="308" x2="950" y2="308" stroke="#93c5fd" stroke-width="0.5"/>
  <rect x="370" y="295" width="260" height="18" rx="4" fill="#1e3a5f"/>
  <text x="500" y="308" text-anchor="middle" fill="#93c5fd" font-size="11">架空接触网 (OCS) @ 750V DC</text>

  <!-- Pylons -->
  <rect x="118" y="280" width="6" height="80" fill="#475569"/>
  <rect x="118" y="270" width="30" height="12" rx="2" fill="#64748b"/>
  <rect x="448" y="280" width="6" height="80" fill="#475569"/>
  <rect x="448" y="270" width="30" height="12" rx="2" fill="#64748b"/>
  <rect x="748" y="280" width="6" height="80" fill="#475569"/>
  <rect x="748" y="270" width="30" height="12" rx="2" fill="#64748b"/>

  <!-- Tram 1 with pantograph -->
  <rect x="220" y="340" width="120" height="45" rx="7" fill="#3b82f6" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="368" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🚃 电车 A</text>
  <!-- Pantograph -->
  <line x1="280" y1="340" x2="280" y2="320" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="260" y="315" width="40" height="6" rx="3" fill="#94a3b8"/>
  <text x="280" y="400" text-anchor="middle" fill="#60a5fa" font-size="9">牵引工况 (耗电)</text>

  <!-- Power flow arrows: tram A -->
  <line x1="290" y1="320" x2="330" y2="320" stroke="#10b981" stroke-width="2" marker-end="url(#arrowE)"/>

  <!-- Tram 2 braking -->
  <rect x="580" y="340" width="120" height="45" rx="7" fill="#10b981" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="368" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🚃 电车 B</text>
  <line x1="640" y1="340" x2="640" y2="320" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="620" y="315" width="40" height="6" rx="3" fill="#94a3b8"/>
  <text x="640" y="400" text-anchor="middle" fill="#34d399" font-size="9">再生制动 (发电)</text>

  <!-- Power flow: tram B back to line -->
  <line x1="620" y1="320" x2="580" y2="320" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Label: energy transfer -->
  <path d="M 380 328 Q 450 300 520 328" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="450" y="297" text-anchor="middle" fill="#fbbf24" font-size="9">车车互馈</text>

  <!-- === Alternative Power Systems === -->
  <rect x="50" y="430" width="900" height="115" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="455" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">🔋 无触网供电方案（去架空线）</text>

  <!-- APS -->
  <rect x="70" y="468" width="260" height="65" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="200" y="488" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">APS 地面供电 (Alstom)</text>
  <text x="200" y="505" text-anchor="middle" fill="#d1fae5" font-size="10">第三轨嵌入路面, 仅列车经过时通电</text>
  <text x="200" y="520" text-anchor="middle" fill="#6ee7b7" font-size="9">波尔多/兰斯/迪拜/里约</text>

  <!-- Supercapacitor -->
  <rect x="355" y="468" width="260" height="65" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1"/>
  <text x="485" y="488" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">🔌 超级电容 / 电池</text>
  <text x="485" y="505" text-anchor="middle" fill="#e9d5ff" font-size="10">站台停车时快充 20~30 秒</text>
  <text x="485" y="520" text-anchor="middle" fill="#c084fc" font-size="9">南京河西/广州黄埔/悉尼轻轨</text>

  <!-- Hydrogen -->
  <rect x="640" y="468" width="295" height="65" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="787" y="488" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">💧 氢燃料电池 (探索中)</text>
  <text x="787" y="505" text-anchor="middle" fill="#bfdbfe" font-size="10">车载氢燃料电池全程供电</text>
  <text x="787" y="520" text-anchor="middle" fill="#93c5fd" font-size="9">德国/中国多地示范运营</text>

  <!-- === Energy Recovery === -->
  <rect x="50" y="565" width="900" height="100" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="590" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">♻️ 再生制动能量回收</text>

  <rect x="70" y="605" width="260" height="48" rx="6" fill="#7c2d12"/>
  <text x="200" y="625" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">🪫 轨旁储能</text>
  <text x="200" y="644" text-anchor="middle" fill="#fdba74" font-size="9">飞轮/超级电容/电池 吸收制动能量</text>

  <rect x="355" y="605" width="260" height="48" rx="6" fill="#3b0764"/>
  <text x="485" y="625" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">🔌 可逆变电所</text>
  <text x="485" y="644" text-anchor="middle" fill="#c084fc" font-size="9">直流逆变为交流, 回馈城市电网</text>

  <rect x="640" y="605" width="295" height="48" rx="6" fill="#064e3b"/>
  <text x="787" y="625" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">🚃🚃 车车互馈</text>
  <text x="787" y="644" text-anchor="middle" fill="#6ee7b7" font-size="9">同一供电区段内制动车→加速车</text>

  <!-- SCADA label at bottom -->
  <text x="500" y="672" text-anchor="middle" fill="#475569" font-size="10">全系统由 OCC SCADA 统一监控: 电压/电流/温度/断路器状态 · 远程分合闸 · 负荷管理 · 能耗分析</text>
</svg>