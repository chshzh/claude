<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Noto Sans CJK SC, Noto Emoji, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold" letter-spacing="1">🚥 有轨电车路口信号优先 (TSP) 工作机制</text>
  <text x="500" y="60" text-anchor="middle" fill="#64748b" font-size="12">Transit Signal Priority — 电车如何"一路绿灯"</text>

  <!-- === Scene: Intersection Top-Down View === -->
  <!-- Horizontal road -->
  <rect x="50" y="100" width="900" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Road surface -->
  <rect x="50" y="165" width="900" height="30" fill="#374151"/>
  <!-- Lane markings -->
  <line x1="50" y1="180" x2="950" y2="180" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="12,8"/>
  <!-- Vertical tram tracks -->
  <rect x="445" y="100" width="110" height="160" fill="#475569" opacity="0.5"/>
  <line x1="500" y1="100" x2="500" y2="260" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="485" y1="100" x2="485" y2="260" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="515" y1="100" x2="515" y2="260" stroke="#94a3b8" stroke-width="0.5"/>

  <!-- Tram vehicle (top one, approaching) -->
  <rect x="455" y="108" width="90" height="40" rx="6" fill="#3b82f6" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="133" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🚃 电车</text>
  <!-- Pantograph -->
  <line x1="500" y1="108" x2="500" y2="98" stroke="#94a3b8" stroke-width="2"/>
  <rect x="485" y="95" width="30" height="5" rx="2" fill="#94a3b8"/>

  <!-- Traffic lights at intersection -->
  <!-- Top light -->
  <rect x="455" y="150" width="20" height="45" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <circle cx="465" cy="161" r="6" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="465" cy="175" r="6" fill="#4b5563"/>
  <circle cx="465" cy="188" r="6" fill="#4b5563"/>
  <!-- Right light -->
  <rect x="930" y="150" width="20" height="45" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <circle cx="940" cy="161" r="6" fill="#10b981" filter="url(#glow)"/>
  <circle cx="940" cy="175" r="6" fill="#4b5563"/>
  <circle cx="940" cy="188" r="6" fill="#4b5563"/>

  <!-- Detection zone label -->
  <rect x="350" y="115" width="80" height="22" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="390" y="130" text-anchor="middle" fill="#fbbf24" font-size="9">检测区</text>

  <!-- Communication lines -->
  <path d="M 465 195 L 300 195 L 300 310 L 140 310" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" fill="none"/>
  <text x="297" y="235" fill="#fbbf24" font-size="8" text-anchor="end">检测信号</text>

  <!-- Car at intersection side -->
  <rect x="920" y="175" width="25" height="14" rx="3" fill="#64748b" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="932" y="185" text-anchor="middle" fill="#cbd5e1" font-size="7">🚗</text>

  <!-- === TSP Techniques Section === -->
  <rect x="50" y="290" width="900" height="155" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="318" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">🔧 五种主动信号优先策略</text>

  <!-- Technique 1: Green Extension -->
  <rect x="70" y="335" width="265" height="95" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="80" y="355" fill="#34d399" font-size="12" font-weight="bold">➊ 绿灯延长</text>
  <text x="80" y="372" fill="#d1fae5" font-size="10">电车接近时当前绿灯</text>
  <text x="80" y="387" fill="#d1fae5" font-size="10">即将结束 → 延长至电车通过</text>
  <text x="80" y="402" fill="#6ee7b7" font-size="9">最多延长预设上限 (如15秒)</text>
  <!-- Mini timeline -->
  <rect x="80" y="413" width="100" height="8" rx="4" fill="#1e293b"/>
  <rect x="80" y="413" width="60" height="8" rx="4" fill="url(#greenGrad)"/>
  <rect x="140" y="413" width="20" height="8" rx="4" fill="#10b981" opacity="0.5"/>
  <text x="185" y="421" fill="#6ee7b7" font-size="7">延长</text>

  <!-- Technique 2: Red Truncation -->
  <rect x="350" y="335" width="265" height="95" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1"/>
  <text x="360" y="355" fill="#fb923c" font-size="12" font-weight="bold">➋ 红灯早断</text>
  <text x="360" y="372" fill="#fed7aa" font-size="10">电车在红灯等待 →</text>
  <text x="360" y="387" fill="#fed7aa" font-size="10">提前结束冲突相位,</text>
  <text x="360" y="402" fill="#fdba74" font-size="9">缩短红灯等待时间</text>
  <rect x="360" y="413" width="100" height="8" rx="4" fill="#1e293b"/>
  <rect x="360" y="413" width="35" height="8" rx="4" fill="url(#redGrad)"/>
  <rect x="393" y="413" width="35" height="8" rx="4" fill="url(#greenGrad)"/>
  <text x="432" y="421" fill="#fdba74" font-size="7">早断</text>

  <!-- Technique 3: Phase Rotation -->
  <rect x="630" y="335" width="305" height="95" rx="8" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="640" y="355" fill="#c084fc" font-size="12" font-weight="bold">➌ 相位旋转</text>
  <text x="640" y="372" fill="#e9d5ff" font-size="10">重新排列信号相位顺序,</text>
  <text x="640" y="387" fill="#e9d5ff" font-size="10">使电车到达时恰好获得绿灯</text>
  <text x="640" y="402" fill="#d8b4fe" font-size="9">不减少总通行量,最推荐</text>
  <text x="640" y="421" fill="#d8b4fe" font-size="8">N→S→E→W 改为 E→W→N→S</text>

  <!-- === Detection Technologies === -->
  <rect x="50" y="465" width="900" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="490" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">📡 电车检测技术</text>

  <rect x="70" y="500" width="165" height="34" rx="6" fill="#1e3a5f"/>
  <text x="152" y="515" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">🔄 感应线圈</text>
  <text x="152" y="528" text-anchor="middle" fill="#64748b" font-size="8">路面嵌入金属探测</text>

  <rect x="250" y="500" width="165" height="34" rx="6" fill="#1e3a5f"/>
  <text x="332" y="515" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">📻 RFID/信标</text>
  <text x="332" y="528" text-anchor="middle" fill="#64748b" font-size="8">车-路无线电应答</text>

  <rect x="430" y="500" width="165" height="34" rx="6" fill="#1e3a5f"/>
  <text x="512" y="515" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">🛰️ GNSS+电子围栏</text>
  <text x="512" y="528" text-anchor="middle" fill="#64748b" font-size="8">GPS/北斗+地理围栏</text>

  <rect x="610" y="500" width="165" height="34" rx="6" fill="#1e3a5f"/>
  <text x="692" y="515" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">📶 C-V2X</text>
  <text x="692" y="528" text-anchor="middle" fill="#64748b" font-size="8">5G车路协同通信</text>

  <rect x="790" y="500" width="145" height="34" rx="6" fill="#1e3a5f"/>
  <text x="862" y="515" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">👁️ 视觉/AI</text>
  <text x="862" y="528" text-anchor="middle" fill="#64748b" font-size="8">摄像头+图像识别</text>

  <!-- Passive TSP note -->
  <rect x="70" y="565" width="860" height="32" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="95" y="586" fill="#22d3ee" font-size="11">🌊 被动优先 (无检测器):  "绿波" — 沿线路口信号灯按电车速度档位联动, 使电车一路绿灯不停车</text>

  <!-- Label: signal controller -->
  <rect x="70" y="618" width="860" height="24" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="500" y="635" text-anchor="middle" fill="#64748b" font-size="9">OCC/ATS 统一调度 → 路口信号控制器 (交通信号机) 执行 → 反馈给 ATS 调节时刻表</text>
</svg>